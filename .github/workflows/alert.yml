name: Alerta Discord

on:
  push:
    branches: [ "main" ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar alerta para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"Novo commit no repositório!\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
