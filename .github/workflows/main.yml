name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build
      run: echo "Build realizado!"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy
      run: echo "Deploy realizado com sucesso!"
