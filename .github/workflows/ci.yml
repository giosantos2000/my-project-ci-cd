name: Java CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Compilar código
        run: javac simple-java-app/src/Main.java

      - name: Compilar testes
        run: javac -cp .:junit-platform-console-standalone.jar simple-java-app/test/java/MainTest.java

      - name: Rodar testes
        run: echo "Simulação de testes executados com sucesso"

      - name: Rodar código
        run: java -cp simple-java-app/src Main

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simular deploy
        run: echo "Deploy realizado com sucesso!"
