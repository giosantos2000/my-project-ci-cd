name: Java CI/CD

on:
  push:
    branches: [ "main", "testes" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compilar código
      run: javac simple-java-app/src/Main.java

    - name: Compilar testes
      run: javac simple-java-app/test/MainTest.java

    - name: Rodar testes
      run: java -cp simple-java-app/test MainTest

    - name: Rodar código
      run: java -cp simple-java-app/src Main

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy simulado
      run: echo "Deploy realizado com sucesso"
